<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step 2 — Study Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,800;1,9..144,400&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ─────────────────────────────────────── */
:root {
  --bg-base:        #F5F1EB;
  --bg-card:        #FFFFFF;
  --bg-elevated:    #F0EBE3;
  --bg-subtle:      #FAF7F3;
  --border:         #E0D8CC;
  --border-bright:  #C8BDB0;
  --text-primary:   #1C1814;
  --text-secondary: #5C5249;
  --text-tertiary:  #9A9089;
  --accent:         #B07830;
  --accent-glow:    rgba(176,120,48,.10);
  --accent-text:    #8A5E20;
  --urgent:         #B83A20;
  --urgent-mid:     #C47C25;
  --success:        #2E7D32;
  --success-bg:     rgba(46,125,50,.10);
  --info:           #1A4A82;
  --info-bg:        rgba(26,74,130,.10);
  --font-display:   'Fraunces', Georgia, serif;
  --font-mono:      'JetBrains Mono', monospace;
  --font-body:      'Outfit', system-ui, sans-serif;
  --r-sm: 6px; --r-md: 10px; --r-lg: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
button  { font-family: var(--font-body); cursor: pointer; }
input, textarea, select { font-family: var(--font-body); }
input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(.2) sepia(.3); }

/* ── AUTH SCREEN ─────────────────────────────────── */
#auth-screen {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; gap: 1rem;
  background: var(--bg-base);
  text-align: center; padding: 2rem;
}
.auth-eyebrow {
  font-family: var(--font-mono); font-size: .65rem; letter-spacing: .12em;
  text-transform: uppercase; color: var(--text-tertiary);
  display: flex; align-items: center; gap: 8px;
}
.auth-eyebrow::before, .auth-eyebrow::after {
  content: ''; width: 20px; height: 1px; background: var(--border);
}
.auth-title {
  font-family: var(--font-display); font-size: 3.2rem; font-weight: 800;
  letter-spacing: -.03em; color: var(--text-primary);
}
.auth-title span { color: var(--accent); }
.auth-sub { color: var(--text-secondary); font-size: .9rem; margin-top: .25rem; }
#sign-in-btn {
  margin-top: .75rem;
  background: var(--accent-glow); border: 1px solid rgba(176,120,48,.3);
  color: var(--accent-text); padding: .7rem 1.75rem;
  border-radius: var(--r-md); font-size: .9rem; font-weight: 500;
  transition: all .2s;
}
#sign-in-btn:hover { background: rgba(176,120,48,.18); border-color: var(--accent); }

/* ── APP SHELL ───────────────────────────────────── */
#app { display: none; max-width: 1060px; margin: 0 auto; padding: 0 24px 80px; }
#app.visible { display: block; }

/* ── HEADER ──────────────────────────────────────── */
.app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 0 14px; border-bottom: 1px solid var(--border); margin-bottom: 20px;
}
.header-left { display: flex; align-items: baseline; gap: 12px; }
.app-title {
  font-family: var(--font-display); font-size: 1.3rem; font-weight: 800;
  letter-spacing: -.02em; color: var(--text-primary);
}
.app-title span { color: var(--accent); }
.app-subtitle {
  font-family: var(--font-mono); font-size: .62rem; letter-spacing: .08em;
  text-transform: uppercase; color: var(--text-tertiary);
}
.header-right { display: flex; align-items: center; gap: 10px; }
#save-status {
  display: flex; align-items: center; gap: 5px;
  font-family: var(--font-mono); font-size: .62rem; color: var(--text-tertiary);
}
#save-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-tertiary); transition: background .3s;
}
#save-dot.saving { background: var(--accent); animation: blink .8s infinite; }
#save-dot.saved  { background: var(--success); }
#sign-out-btn {
  font-family: var(--font-mono); font-size: .62rem;
  background: transparent; border: 1px solid var(--border);
  color: var(--text-tertiary); padding: 3px 10px;
  border-radius: var(--r-sm); transition: all .15s;
}
#sign-out-btn:hover { border-color: var(--border-bright); color: var(--text-secondary); }

/* ── TAB BAR ─────────────────────────────────────── */
.tab-bar {
  display: flex; gap: 2px; padding: 4px;
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: var(--r-md); margin-bottom: 24px; overflow-x: auto;
}
.tab-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: var(--r-sm);
  border: 1px solid transparent; background: transparent;
  color: var(--text-tertiary); font-family: var(--font-mono);
  font-size: .75rem; font-weight: 500; cursor: pointer;
  transition: all .15s; white-space: nowrap; position: relative;
}
.tab-btn:hover { color: var(--text-secondary); background: rgba(0,0,0,.04); }
.tab-btn.active {
  background: var(--bg-card); color: var(--accent-text);
  border-color: var(--border); box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.tab-btn.active::before {
  content: ''; position: absolute; left: 0; top: 4px; bottom: 4px;
  width: 2px; background: var(--accent); border-radius: 1px;
}
.tab-shortcut {
  font-size: .52rem; padding: 1px 4px;
  border: 1px solid var(--border); border-radius: 3px;
  color: var(--text-tertiary); line-height: 1.5;
}
.tab-btn.active .tab-shortcut { border-color: var(--border-bright); color: var(--accent-text); opacity: .55; }

/* ── TAB PANELS ──────────────────────────────────── */
.tab-panel { display: none; }
.tab-panel.active { display: block; animation: panel-in .18s ease both; }
@keyframes panel-in {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── CARDS ───────────────────────────────────────── */
.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 1.25rem 1.5rem;
  transition: border-color .15s;
}
.card:hover { border-color: var(--border-bright); }
.card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 14px; margin-bottom: 16px; }

/* ── UTILITIES ───────────────────────────────────── */
.section-label {
  font-family: var(--font-mono); font-size: .62rem; letter-spacing: .1em;
  text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 10px;
  display: flex; align-items: center; gap: 10px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.section-heading {
  font-family: var(--font-display); font-size: 1rem; font-weight: 700;
  color: var(--text-primary); letter-spacing: -.01em; margin-bottom: 12px;
}
.gap-12 { margin-bottom: 12px; }
.gap-20 { margin-bottom: 20px; }

/* ── BUTTONS ─────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: .5rem 1rem; border-radius: var(--r-sm);
  font-family: var(--font-mono); font-size: .75rem; font-weight: 500;
  transition: all .15s; cursor: pointer; border: 1px solid transparent;
}
.btn-primary { background: var(--accent-glow); border-color: rgba(176,120,48,.3); color: var(--accent-text); }
.btn-primary:hover { background: rgba(176,120,48,.18); border-color: var(--accent); }
.btn-ghost { background: transparent; border-color: var(--border); color: var(--text-secondary); }
.btn-ghost:hover { border-color: var(--border-bright); color: var(--text-primary); }
.btn-danger { background: rgba(184,58,32,.08); border-color: rgba(184,58,32,.2); color: #B83A20; }
.btn-danger:hover { background: rgba(184,58,32,.15); }
.btn-sm { padding: 3px 9px; font-size: .68rem; }
.btn-xs { padding: 2px 6px; font-size: .62rem; }

/* ── TAGS ────────────────────────────────────────── */
.tag {
  display: inline-block; font-family: var(--font-mono); font-size: .6rem;
  font-weight: 500; letter-spacing: .04em; padding: 2px 7px;
  border-radius: 4px; text-transform: uppercase; vertical-align: middle;
}
.tag-amber { background: var(--accent-glow); color: var(--accent-text); border: 1px solid rgba(176,120,48,.2); }
.tag-green { background: var(--success-bg); color: #2E7D32; border: 1px solid rgba(46,125,50,.2); }
.tag-red   { background: rgba(184,58,32,.08); color: #B83A20; border: 1px solid rgba(184,58,32,.2); }
.tag-blue  { background: var(--info-bg); color: #1A4A82; border: 1px solid rgba(26,74,130,.2); }
.tag-ghost { background: transparent; color: var(--text-tertiary); border: 1px solid var(--border); }

/* ── INPUTS ──────────────────────────────────────── */
.input {
  background: var(--bg-subtle); border: 1px solid var(--border);
  border-radius: var(--r-sm); color: var(--text-primary);
  padding: .45rem .8rem; font-size: .85rem; outline: none;
  transition: border-color .15s; width: 100%;
}
.input:focus { border-color: var(--accent); }
.input::placeholder { color: var(--text-tertiary); }
select.input { cursor: pointer; }

/* ── COUNTDOWN CARDS ─────────────────────────────── */
.countdown-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 1.25rem 1.5rem;
  position: relative; overflow: hidden; transition: border-color .3s;
}
.countdown-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent) 0%, transparent 70%);
  transition: background .3s;
}
.countdown-card.warn  { border-color: rgba(196,124,37,.4); }
.countdown-card.warn::before  { background: linear-gradient(90deg, var(--urgent-mid) 0%, transparent 70%); }
.countdown-card.urgent { border-color: rgba(184,58,32,.4); }
.countdown-card.urgent::before { background: linear-gradient(90deg, var(--urgent) 0%, transparent 70%); }
.cd-icon {
  width: 30px; height: 30px; border-radius: 7px;
  background: var(--accent-glow); display: flex; align-items: center;
  justify-content: center; font-size: 14px; margin-bottom: .8rem;
}
.cd-num {
  font-family: var(--font-display); font-size: 3rem; font-weight: 800;
  line-height: 1; letter-spacing: -.03em; color: var(--accent);
  transition: color .3s;
}
.countdown-card.warn  .cd-num { color: var(--urgent-mid); }
.countdown-card.urgent .cd-num { color: var(--urgent); animation: cpulse 2s ease-in-out infinite; }
@keyframes cpulse { 0%,100%{opacity:1} 50%{opacity:.55} }
.cd-lbl {
  font-family: var(--font-mono); font-size: .65rem; letter-spacing: .07em;
  text-transform: uppercase; color: var(--text-tertiary); margin-top: .4rem;
}

/* ── TODAY'S FOCUS ───────────────────────────────── */
.focus-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 1.1rem 1.25rem;
}
.focus-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: .85rem; }
.focus-title { font-family: var(--font-display); font-size: .95rem; font-weight: 700; color: var(--text-primary); }
.focus-date  { font-family: var(--font-mono); font-size: .62rem; color: var(--text-tertiary); }
.focus-item  {
  display: flex; align-items: center; gap: 10px;
  padding: .42rem 0; border-bottom: 1px solid var(--border); cursor: pointer;
}
.focus-item:last-of-type { border-bottom: none; }
.f-check {
  width: 17px; height: 17px; border-radius: 4px;
  border: 1px solid var(--border-bright); display: flex;
  align-items: center; justify-content: center; font-size: 9px;
  flex-shrink: 0; transition: all .2s cubic-bezier(.34,1.56,.64,1);
}
.focus-item.done .f-check { background: var(--success-bg); border-color: var(--success); color: var(--success); transform: scale(1.08); }
.focus-item.done .f-lbl   { text-decoration: line-through; color: var(--text-tertiary); }
.f-lbl  { font-family: var(--font-mono); font-size: .8rem; color: var(--text-primary); flex: 1; }
.focus-add { display: flex; gap: 6px; margin-top: .7rem; }

/* ── CHART ───────────────────────────────────────── */
.chart-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 1.25rem; }
.chart-hdr  { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
.chart-title { font-family: var(--font-display); font-size: .95rem; font-weight: 700; color: var(--text-primary); }
.chart-legend { display: flex; gap: 14px; flex-wrap: wrap; }
.chart-legend-item { display: flex; align-items: center; gap: 5px; font-family: var(--font-mono); font-size: .62rem; color: var(--text-tertiary); }
.chart-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
#shelf-chart { max-height: 200px; }

/* ── PROGRESS RING ───────────────────────────────── */
.progress-bar-card {
  display: flex; align-items: center; gap: 18px;
  padding: 1rem 1.25rem; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--r-lg); margin-bottom: 14px;
}
.ring-stats .ring-main { font-family: var(--font-display); font-size: 1.4rem; font-weight: 800; color: var(--accent); }
.ring-stats .ring-sub  { font-family: var(--font-mono); font-size: .62rem; color: var(--text-tertiary); }
.ring-stats .ring-pct  { font-family: var(--font-mono); font-size: .72rem; color: var(--text-secondary); margin-top: .15rem; }

/* ── TOPIC ROWS ──────────────────────────────────── */
.topic-list { display: flex; flex-direction: column; gap: 3px; margin-bottom: 18px; }
.topic-row {
  display: flex; align-items: center; gap: 10px;
  padding: .58rem .9rem; border-radius: var(--r-sm);
  border: 1px solid transparent; cursor: pointer; transition: all .15s;
}
.topic-row:hover { background: var(--bg-elevated); border-color: var(--border); }
.topic-row.done { opacity: .55; }
.topic-row.done .topic-name { text-decoration: line-through; color: var(--text-tertiary); }
.t-check {
  width: 18px; height: 18px; border-radius: 4px; border: 1px solid var(--border-bright);
  display: flex; align-items: center; justify-content: center; font-size: 10px;
  flex-shrink: 0; transition: all .22s cubic-bezier(.34,1.56,.64,1);
}
.topic-row.done .t-check { background: var(--success-bg); border-color: var(--success); color: var(--success); transform: scale(1.06); }
.topic-name { font-family: var(--font-mono); font-size: .82rem; flex: 1; color: var(--text-primary); }
.topic-del  { background: transparent; border: none; color: transparent; font-size: .8rem; padding: 0 3px; transition: color .15s; }
.topic-row:hover .topic-del { color: var(--text-tertiary); }
.topic-del:hover { color: var(--urgent) !important; }
.add-topic-row  { display: flex; gap: 8px; }

/* ── RESOURCES ───────────────────────────────────── */
.resources-section { margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border); }
.resource-item {
  display: flex; align-items: center; gap: 8px;
  padding: .5rem .85rem; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--r-sm); margin-bottom: 6px;
}
.res-name  { flex: 1; font-size: .85rem; color: var(--text-secondary); }
.res-del   { background: transparent; border: none; color: var(--text-tertiary); font-size: .9rem; cursor: pointer; padding: 0 3px; transition: color .15s; }
.res-del:hover { color: var(--urgent); }
.add-res-row { display: flex; gap: 8px; margin-top: 8px; }

/* ── ASSESSMENTS ─────────────────────────────────── */
.assess-section { margin-bottom: 26px; }
.assess-entry {
  display: grid; grid-template-columns: 1fr auto auto auto;
  gap: 10px; align-items: center;
  padding: .55rem .9rem; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--r-sm); margin-bottom: 6px;
}
.ae-name  { font-family: var(--font-mono); font-size: .82rem; color: var(--text-primary); }
.ae-score { font-family: var(--font-mono); font-size: .9rem; font-weight: 600; color: var(--accent); }
.ae-date  { font-family: var(--font-mono); font-size: .65rem; color: var(--text-tertiary); }
.ae-del   { background: transparent; border: none; color: var(--text-tertiary); cursor: pointer; font-size: .85rem; transition: color .15s; }
.ae-del:hover { color: var(--urgent); }
.new-assess-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 10px; }
.new-assess-row .input { flex: 1; min-width: 90px; }

/* ── MISSED QUESTIONS ────────────────────────────── */
.missed-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.missed-total-lbl { font-family: var(--font-mono); font-size: .78rem; color: var(--text-secondary); }
.session-block { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-lg); margin-bottom: 10px; overflow: hidden; }
.session-hdr { display: flex; align-items: center; justify-content: space-between; padding: .82rem 1.1rem; cursor: pointer; transition: background .15s; }
.session-hdr:hover { background: var(--bg-elevated); }
.sess-title { font-family: var(--font-mono); font-size: .84rem; font-weight: 600; color: var(--text-primary); }
.sess-right { display: flex; align-items: center; gap: 10px; }
.sess-toggle { font-family: var(--font-mono); font-size: .7rem; color: var(--text-tertiary); transition: transform .2s; }
.session-hdr.open .sess-toggle { transform: rotate(180deg); }
.session-body { display: none; border-top: 1px solid var(--border); }
.session-body.open { display: block; }
.mq-entry { padding: .88rem 1.1rem; border-bottom: 1px solid var(--border); }
.mq-entry:last-child { border-bottom: none; }
.mq-topic-row { display: flex; align-items: center; gap: 8px; margin-bottom: .55rem; }
.mq-topic { font-family: var(--font-mono); font-size: .8rem; font-weight: 500; color: var(--text-primary); }
.mq-field { font-family: var(--font-mono); font-size: .6rem; letter-spacing: .08em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: .18rem; }
.mq-val   { font-size: .84rem; color: var(--text-secondary); line-height: 1.55; margin-bottom: .55rem; }
.mq-correct-box { background: var(--accent-glow); border: 1px solid rgba(176,120,48,.18); border-radius: var(--r-sm); padding: .55rem .82rem; }
.mq-correct-box .mq-field { color: var(--accent-text); }
.mq-correct-box .mq-val   { color: var(--text-primary); margin-bottom: 0; }
.mq-add-btn-row { padding: .65rem 1.1rem; background: var(--bg-subtle); }

/* ── INLINE ENTRY FORM ───────────────────────────── */
.inline-entry-form {
  background: var(--bg-subtle); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 1rem 1.1rem; margin: .5rem 1.1rem 1rem;
  display: flex; flex-direction: column; gap: 8px;
}
.inline-entry-form .form-row { display: flex; gap: 8px; align-items: flex-start; }
.inline-entry-form .form-row.stack { flex-direction: column; }
.inline-entry-form label {
  font-family: var(--font-mono); font-size: .6rem; letter-spacing: .08em;
  text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 3px; display: block;
}
.inline-entry-form textarea.input { min-height: 60px; resize: vertical; }
.form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }

/* ── NOTES ───────────────────────────────────────── */
.notes-tb { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.arch-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 17px; height: 17px; border-radius: 50%;
  background: var(--accent); color: #fff;
  font-size: .58rem; font-weight: 700; margin-left: 4px;
}
.note-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; margin-bottom: 14px; }
.note-hdr {
  display: flex; align-items: center; gap: 10px;
  padding: .75rem 1.1rem; border-bottom: 1px solid var(--border);
}
.note-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  background: var(--text-tertiary); transition: background .3s;
}
.note-dot.saving { background: var(--accent); animation: blink .8s infinite; }
.note-dot.saved  { background: var(--success); animation: none; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.note-title-inp {
  flex: 1; background: transparent; border: none; outline: none;
  font-family: var(--font-display); font-size: 1rem; font-weight: 700;
  color: var(--text-primary); letter-spacing: -.01em;
}
.note-title-inp::placeholder { color: var(--text-tertiary); font-weight: 300; }
.note-acts { display: flex; gap: 6px; }
.note-tb {
  display: flex; align-items: center; gap: 3px;
  padding: 5px 8px; border-bottom: 1px solid var(--border);
  background: var(--bg-subtle); flex-wrap: wrap;
}
.fmt-btn {
  font-family: var(--font-mono); font-size: .68rem; padding: 2px 7px;
  background: transparent; border: 1px solid var(--border);
  border-radius: 3px; color: var(--text-tertiary); cursor: pointer; transition: all .15s;
}
.fmt-btn:hover { border-color: var(--border-bright); color: var(--text-primary); }
.clr-dot {
  width: 13px; height: 13px; border-radius: 50%; cursor: pointer;
  border: 1px solid rgba(0,0,0,.12); transition: transform .15s; flex-shrink: 0;
}
.clr-dot:hover { transform: scale(1.3); }
.tb-sep { width: 1px; height: 15px; background: var(--border); margin: 0 2px; }
.note-editor {
  padding: .95rem 1.1rem; font-family: var(--font-display);
  font-size: .9rem; line-height: 1.8; color: var(--text-secondary);
  min-height: 100px; outline: none;
}
.note-editor:empty::before { content: attr(placeholder); color: var(--text-tertiary); pointer-events: none; }
.note-editor b  { color: var(--text-primary); }
.note-editor ul { padding-left: 1.4rem; }
.note-editor ol { padding-left: 1.4rem; }

/* ── ARCHIVE MODAL ───────────────────────────────── */
.modal-ov {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.45); z-index: 100;
  align-items: center; justify-content: center;
}
.modal-ov.open { display: flex; }
.modal-box {
  background: var(--bg-card); border: 1px solid var(--border-bright);
  border-radius: var(--r-lg); width: 100%; max-width: 560px;
  max-height: 80vh; overflow: hidden; display: flex; flex-direction: column;
}
.modal-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: .95rem 1.25rem; border-bottom: 1px solid var(--border);
}
.modal-title { font-family: var(--font-display); font-size: 1rem; font-weight: 700; color: var(--text-primary); }
.modal-close { background: transparent; border: none; color: var(--text-secondary); font-size: 1.2rem; cursor: pointer; line-height: 1; }
.modal-close:hover { color: var(--text-primary); }
.modal-body { overflow-y: auto; padding: 1rem; }
.modal-empty { color: var(--text-tertiary); font-size: .85rem; text-align: center; padding: 2rem; }
.arch-note-item { padding: .75rem 1rem; border: 1px solid var(--border); border-radius: var(--r-md); margin-bottom: 8px; }
.arch-note-title { font-family: var(--font-display); font-size: .9rem; font-weight: 600; color: var(--text-primary); margin-bottom: .35rem; }
.arch-note-acts { display: flex; gap: 6px; margin-top: .5rem; }

/* ── COMMAND PALETTE ─────────────────────────────── */
#cmd-ov {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.45); z-index: 200;
  align-items: flex-start; justify-content: center; padding-top: 14vh;
}
#cmd-ov.open { display: flex; }
#cmd-box {
  background: var(--bg-card); border: 1px solid var(--border-bright);
  border-radius: var(--r-lg); width: 100%; max-width: 540px;
  box-shadow: 0 20px 50px rgba(0,0,0,.15); overflow: hidden;
}
#cmd-in-row {
  display: flex; align-items: center; gap: 10px;
  padding: .82rem 1.1rem; border-bottom: 1px solid var(--border);
}
#cmd-icon { color: var(--accent); font-size: 1rem; }
#cmd-input {
  flex: 1; background: transparent; border: none; outline: none;
  font-family: var(--font-mono); font-size: .85rem; color: var(--text-primary);
}
#cmd-input::placeholder { color: var(--text-tertiary); }
#cmd-hint { font-family: var(--font-mono); font-size: .58rem; color: var(--text-tertiary); white-space: nowrap; }
#cmd-results { max-height: 340px; overflow-y: auto; }
.cmd-res {
  display: flex; align-items: center; gap: 10px;
  padding: .58rem 1.1rem; cursor: pointer;
  font-family: var(--font-mono); font-size: .8rem;
  color: var(--text-secondary); transition: background .1s;
}
.cmd-res:hover, .cmd-res.sel { background: var(--accent-glow); color: var(--accent-text); }
.cmd-res-ico { width: 20px; text-align: center; font-size: .85rem; }
.cmd-res-lbl { flex: 1; }
.cmd-res-meta { font-size: .6rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .06em; }
.cmd-grp { font-family: var(--font-mono); font-size: .58rem; letter-spacing: .1em; text-transform: uppercase; color: var(--text-tertiary); padding: .45rem 1.1rem .25rem; }
#cmd-empty { padding: 1.4rem; font-family: var(--font-mono); font-size: .8rem; color: var(--text-tertiary); text-align: center; }

/* ── CONFIRM DIALOG ──────────────────────────────── */
#confirm-ov {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.4); z-index: 300;
  align-items: center; justify-content: center;
}
#confirm-ov.open { display: flex; }
#confirm-box {
  background: var(--bg-card); border: 1px solid var(--border-bright);
  border-radius: var(--r-lg); padding: 1.5rem; max-width: 380px; width: 94%;
  box-shadow: 0 10px 30px rgba(0,0,0,.12);
}
#confirm-msg { color: var(--text-secondary); font-size: .9rem; margin-bottom: 1.25rem; line-height: 1.55; }
#confirm-acts { display: flex; gap: 8px; justify-content: flex-end; }

/* ── RESPONSIVE ──────────────────────────────────── */
@media (max-width: 580px) {
  #app { padding: 0 14px 60px; }
  .tab-shortcut { display: none; }
  .cd-num { font-size: 2.2rem; }
  .assess-entry { grid-template-columns: 1fr auto auto; }
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div style="text-align:center;width:100%;max-width:520px">
    <div style="font-family:var(--font-mono);font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:1rem">USMLE Prep</div>
    <div class="auth-title">Step <span>2</span></div>
    <div style="font-family:var(--font-display);font-size:1.1rem;font-weight:300;color:var(--text-secondary);margin:.4rem 0 1.5rem">Welcome back, Thomas Costner</div>
    <button id="sign-in-btn" onclick="handleSignIn()">Sign in with Google</button>
    <div id="quote-block" style="margin-top:2.8rem;padding:0 1.5rem">
      <div id="quote-text" style="font-family:var(--font-display);font-style:italic;font-size:1.05rem;color:var(--text-secondary);line-height:1.75;min-height:4rem;transition:opacity .6s ease"></div>
      <div id="quote-attr" style="font-family:var(--font-mono);font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text-tertiary);margin-top:.7rem;transition:opacity .6s ease"></div>
    </div>
  </div>
</div>
<script>
(function(){
  const quotes = [
    { text: "The difference between the impossible and the possible lies in a person's determination.", attr: "Tommy Lasorda" },
    { text: "You have to fight to reach your dream. You have to sacrifice and work hard for it.", attr: "Lionel Messi" },
    { text: "Hard work beats talent when talent doesn't work hard.", attr: "Tim Notke" },
    { text: "Champions aren't made in the gyms. Champions are made from something they have deep inside them — a desire, a dream, a vision.", attr: "Muhammad Ali" },
    { text: "Don't wish it were easier. Wish you were better.", attr: "Jim Rohn" },
    { text: "The more I practice, the luckier I get.", attr: "Gary Player" },
    { text: "It's not whether you get knocked down; it's whether you get up.", attr: "Vince Lombardi" },
    { text: "The pain you feel today will be the strength you feel tomorrow.", attr: "" },
    { text: "Obsessed is a word the lazy use to describe the dedicated.", attr: "" },
    { text: "You don't get what you wish for. You get what you work for.", attr: "" },
    { text: "Somewhere someone is working harder than you. Don't let them win.", attr: "" },
    { text: "Outwork everyone. Every single day.", attr: "" },
    { text: "The best never rest.", attr: "" },
    { text: "Success is the sum of small efforts repeated day in and day out.", attr: "Robert Collier" },
    { text: "Excellence is not a destination but a continuous journey that never ends.", attr: "" },
  ];
  let idx = Math.floor(Math.random() * quotes.length);
  function showQuote(i) {
    const qt = document.getElementById('quote-text');
    const qa = document.getElementById('quote-attr');
    if (!qt || !qa) return;
    qt.style.opacity = '0'; qa.style.opacity = '0';
    setTimeout(() => {
      qt.textContent = '\u201C' + quotes[i].text + '\u201D';
      qa.textContent = '— ' + (quotes[i].attr || 'Anonymous');
      qt.style.opacity = '1'; qa.style.opacity = '1';
    }, 600);
  }
  showQuote(idx);
  setInterval(() => { idx = (idx + 1) % quotes.length; showQuote(idx); }, 15000);
})();
</script>

<!-- APP -->
<div id="app">
  <div class="app-header">
    <div class="header-left">
      <div class="app-title">Step <span>2</span></div>
      <div class="app-subtitle">Thomas Costner · Study Dashboard</div>
    </div>
    <div class="header-right">
      <div id="save-status"><div id="save-dot"></div><span id="save-lbl">–</span></div>
      <button id="sign-out-btn" onclick="handleSignOut()">Sign out</button>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('dashboard')" id="btn-dashboard">Dashboard<span class="tab-shortcut">⌘1</span></button>
    <button class="tab-btn" onclick="showTab('topics')" id="btn-topics">Topic List<span class="tab-shortcut">⌘2</span></button>
    <button class="tab-btn" onclick="showTab('assessments')" id="btn-assessments">Assessments<span class="tab-shortcut">⌘3</span></button>
    <button class="tab-btn" onclick="showTab('missed')" id="btn-missed">Missed Qs<span class="tab-shortcut">⌘4</span></button>
    <button class="tab-btn" onclick="showTab('notes')" id="btn-notes">Notes<span class="tab-shortcut">⌘5</span></button>
  </div>

  <!-- DASHBOARD (rebuilt by app.js) -->
  <div id="tab-dashboard" class="tab-panel active"></div>

  <!-- TOPICS (rebuilt by app.js) -->
  <div id="tab-topics" class="tab-panel"></div>

  <!-- ASSESSMENTS -->
  <div id="tab-assessments" class="tab-panel">
    <div class="assess-section">
      <div class="section-label">NBME Self Assessments</div>
      <div id="nbme-list"></div>
      <div class="new-assess-row">

      </div>
    </div>
    <div class="assess-section">
      <div class="section-label">CMS / Other Forms</div>
      <div id="cms-list"></div>
      <div class="new-assess-row">
        <input class="input" id="cms-name-inp" placeholder="Form name…" style="flex:2">
        <input class="input" type="text" id="cms-score-inp" placeholder="Score (0–100)" style="max-width:120px">
        <input class="input" type="date" id="cms-date-inp" style="max-width:145px">
        <button class="btn btn-primary btn-sm" onclick="addCMSScore()">Add</button>

    </div>
  </div>

  <!-- MISSED QS -->

      <button class="btn btn-primary btn-sm" onclick="addMissedSession()">+ New Session</button>
    </div>
    <div id="sessions-container"></div>
  </div>

  <!-- NOTES -->
  <div id="tab-notes" class="tab-panel">
    <div class="notes-tb">
      <button class="btn btn-primary" onclick="addNote()">+ New Note</button>
      <button class="btn btn-ghost" onclick="openArchiveModal()" style="position:relative">
        Archives<span id="arch-badge" style="display:none" class="arch-badge"></span>
      </button>
    </div>
    <div id="notes-container"></div>
  </div>
</div>

<!-- ARCHIVE MODAL (notes + topics share this) -->
<div id="arch-modal" class="modal-ov" onclick="if(event.target===this)closeArchiveModal()">
  <div class="modal-box">
    <div class="modal-hdr">
      <div class="modal-title" id="arch-modal-title">Archived Notes</div>
      <button class="modal-close" onclick="closeArchiveModal()">×</button>
    </div>
    <div class="modal-body">
      <div id="arch-list"></div>
      <div id="arch-empty" class="modal-empty" style="display:none">Nothing archived yet.</div>
    </div>
  </div>
</div>

<!-- COMMAND PALETTE -->
<div id="cmd-ov" onclick="if(event.target===this)closeCmdPalette()">
  <div id="cmd-box">
    <div id="cmd-in-row">
      <span id="cmd-icon">⌘</span>
      <input id="cmd-input" placeholder="Jump to tab, search notes…" autocomplete="off"
        oninput="filterCmds()" onkeydown="cmdKey(event)">
      <span id="cmd-hint">ESC</span>
    </div>
    <div id="cmd-results"></div>
  </div>
</div>

<!-- CONFIRM DIALOG -->
<div id="confirm-ov" onclick="if(event.target===this)confirmResolve(false)">
  <div id="confirm-box">
    <div id="confirm-msg"></div>
    <div id="confirm-acts">
      <button class="btn btn-ghost" onclick="confirmResolve(false)">Cancel</button>
      <button class="btn btn-danger" onclick="confirmResolve(true)">Delete</button>
    </div>
  </div>
</div>
